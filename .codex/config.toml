# Codex CLI Project Configuration
# This file enables project-specific Codex settings

# Default model configuration
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"

# Approval policy
approval_policy = "on-request"

# Feature toggles
default_permissions = "project-edit"
[features]
hooks = true
skills = true

# Skills configuration - enable project skills
[[skills.config]]
enabled = true
path = ".codex/skills/context-loader"

[mcp_servers.cocoindex-code]
command = "uvx"
args = ["--prerelease=explicit", "--with", "cocoindex>=1.0.0a16", "cocoindex-code@latest"]
enabled = true

[permissions.project-edit]
extends = ":workspace"

[permissions.project-edit.filesystem.":workspace_roots"]
"." = "write"
"**/.env" = "deny"
"**/*.env" = "deny"
"**/.ssh/**" = "deny"
"**/.aws/**" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
# Guardrail self-tamper protection: an agent must not be able to disable or
# rewrite the hooks/rules/trust-ledger that constrain it (see
# docs/design/codex-cli-harness.md §0 for the trust-ledger integrity caveat).
"**/.codex/hooks/**" = "deny"
"**/.codex/hooks.json" = "deny"
"**/.codex/rules/**" = "deny"
"**/.codex/validation.json" = "deny"
"**/.codex/config.toml" = "deny"
"**/.codex/schemas/**" = "deny"
"**/.claude/orchestra.json" = "deny"
