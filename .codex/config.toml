# Codex CLI Project Configuration
# This file enables project-specific Codex settings

# Default model configuration
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"

# Approval policy
approval_policy = "on-request"

# Feature toggles
[features]
skills = true

# Skills configuration - enable project skills
[[skills.config]]
enabled = true
path = ".codex/skills/context-loader"

[mcp_servers.cocoindex-code]
command = "uvx"
args = ["--prerelease=explicit", "--with", "cocoindex>=1.0.0a16", "cocoindex-code@latest"]
enabled = true
