enabled: true
server_name: "cocoindex-code"
command: "uvx"
args:
  - "--prerelease=explicit"
  - "--with"
  - "cocoindex>=1.0.0a16"
  - "cocoindex-code@latest"

targets:
  claude:
    enabled: true
    type: "stdio"
    force_stdio: false
  codex:
    enabled: true
    force_stdio: false
  gemini:
    enabled: true
    force_stdio: false

# mcp-proxy 対応（v2）— .local.yaml で proxy.enabled: true にしてオプトイン
proxy:
  enabled: false
  port: 8792
  port_range: 100         # project_dir ハッシュで port〜port+99 を自動割り当て。0 で固定モード
  host: "127.0.0.1"
  pid_file: ".claude/.mcp-proxy.pid"
  startup_timeout: 10
