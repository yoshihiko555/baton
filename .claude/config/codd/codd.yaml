# codd: ドキュメント整合性レイヤーの設定
#
# プロジェクト固有の上書きは codd.local.yaml で行う（config-loading ルール参照）。
# scan が走査する対象・kind/relation 語彙・検査レベル・グラフ保存先を定義する。

# 機能全体の有効/無効。
enabled: true

# scan が走査する対象ファイル（glob）。include から exclude を差し引く。
scope:
  include:
    - "docs/**/*.md"
    - ".claude/rules/*.md"
    - ".claude/Plans.md"
    - "templates/context/*.md"
  exclude:
    - "docs/adr/_template.md"
    - "docs/adr/DECISIONS.md"
    # 評価セットは CODD 統合まで対象外（ADR-20260703-028: kind 語彙に eval がないため）
    - "docs/evaluation/**/*.md"

# 許可する kind 語彙（scope と整合させる）。
kinds:
  - requirement
  - design
  - adr
  - plan
  - rule
  - instruction

# 許可する relation 語彙。
relations:
  - derives_from
  - refines
  - implements
  - references
  - supersedes

# 被参照ゼロを許容する最上流 kind（orphan 検査から除外）。
roots:
  - requirement
  - instruction

# 依存グラフの保存形式と出力先。
graph_store:
  format: jsonl
  path: ".claude/codd/graph.jsonl"

# 各検査のレベル（error / warning / off）。
checks:
  dangling: error
  duplicate: error
  cycle: error
  unknown: error
  missing_frontmatter: warning
  orphan: warning
  drift: warning

# impact 分析（codd impact --diff <ref>）の信頼度スコア設定。
# 変更ノードの下流を Green（自動更新可）/ Amber（要確認）/ Gray（参考）に分類する。
# path_score = min(経路上の relation 重み) × decay^(hops-1)、ノードは全経路の最良値を採る。
impact:
  # relation 種別ごとの重み（強い派生ほど高信頼）。
  relation_weights:
    derives_from: 1.0
    refines: 1.0
    implements: 1.0
    supersedes: 0.6
    references: 0.3
  # 1 hop ごとの距離減衰係数。
  decay: 0.5
  # 伝播を辿る最大ホップ数（decay=0.5 では 6 hop で score < 0.04 のため打ち切り）。
  max_hops: 6
  # 帯域の閾値（score >= green は Green、>= amber は Amber、それ未満は Gray）。
  green_threshold: 0.8
  amber_threshold: 0.4
  # 直接事実とみなす relation 重みの下限（1 hop かつこの値以上で Corroboration 免除）。
  strong_relation_min: 1.0
  # Green に必要な裏付け起点数（直接事実でない推論的影響に適用）。
  corroboration_min_origins: 2
  # 複数の強起点が裏付ける場合の 1 起点あたり加点（弱リンク水増し防止）。
  evidence_bonus: 0.05
