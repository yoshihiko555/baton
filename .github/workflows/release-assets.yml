name: Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: build-and-upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.event.release.tag_name }}"
          fi
          if [[ -z "$tag" ]]; then
            echo "tag is empty" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.vars.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify release commit
        run: |
          go test ./... -v
          go vet ./...

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          targets=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch archive <<< "$target"

            bin="baton"
            if [[ "$goos" == "windows" ]]; then
              bin="baton.exe"
            fi

            workdir="$(mktemp -d)"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${{ steps.vars.outputs.version }}" \
                -o "$workdir/$bin" .

            base="baton_${{ steps.vars.outputs.tag }}_${goos}_${goarch}"
            if [[ "$archive" == "tar.gz" ]]; then
              tar -C "$workdir" -czf "dist/${base}.tar.gz" "$bin"
            else
              (
                cd "$workdir"
                zip -q "$OLDPWD/dist/${base}.zip" "$bin"
              )
            fi

            rm -rf "$workdir"
          done

          (
            cd dist
            sha256sum baton_* > checksums.txt
          )

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.vars.outputs.tag }}" dist/* --clobber
